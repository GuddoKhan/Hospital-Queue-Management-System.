<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Queue Management System</title>
    <style>
        :root {
            /* Holographic Theme Variables */
            --primary: #06b6d4; 
            --primary-glow: rgba(6, 182, 212, 0.5);
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --bg-gradient-3: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        [data-theme="light"] {
            --bg-gradient-1: #e0f2fe;
            --bg-gradient-2: #ede9fe;
            --bg-gradient-3: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-muted: #475569;
            --input-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: all 0.5s ease;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h1 { text-align: center; text-shadow: 0 0 10px var(--primary-glow); letter-spacing: 1px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--primary); font-size: 0.9em; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .settings-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; font-size: 24px; cursor: pointer; transition: transform 0.3s ease; text-shadow: 0 0 10px var(--primary-glow); }
        .settings-btn:hover { transform: rotate(90deg); }

        .nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .nav button { background: none; border: none; font-size: 16px; font-weight: bold; color: var(--text-muted); cursor: pointer; padding: 10px 20px; transition: all 0.3s ease; border-radius: 8px; }
        .nav button:hover { background: rgba(255, 255, 255, 0.05); }
        .nav button.active { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); border-bottom: 3px solid var(--primary); background: linear-gradient(to top, var(--primary-glow), transparent); }

        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-module { background: rgba(0, 0, 0, 0.15); border: 1px solid var(--primary); border-radius: 12px; padding: 25px 20px 20px 20px; margin-bottom: 20px; position: relative; box-shadow: 0 0 15px var(--primary-glow) inset; }
        .ai-module::before { content: '🤖 AI & Voice Integration Module'; position: absolute; top: -12px; left: 20px; background: var(--bg-gradient-1); padding: 2px 10px; font-size: 0.85em; font-weight: bold; color: var(--primary); border-radius: 5px; border: 1px solid var(--primary); }

        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 15px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-main); outline: none; transition: all 0.3s ease; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        button.action-btn { background-color: transparent; color: var(--text-main); border: 1px solid var(--primary); box-shadow: 0 0 10px var(--primary-glow) inset, 0 0 10px var(--primary-glow); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        button.action-btn:hover { background-color: var(--primary); color: #fff; box-shadow: 0 0 20px var(--primary); }
        button.action-btn:disabled { border-color: var(--text-muted); box-shadow: none; color: var(--text-muted); cursor: not-allowed; }

        .queue-box { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px); transition: transform 0.2s ease; }
        .queue-box:hover { transform: translateX(5px); border-color: var(--primary); }
        .current-serving { background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent); border-left: 4px solid #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }

        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: bold; margin-left: 10px; text-transform: uppercase; }
        .badge-Critical { background: rgba(220, 38, 38, 0.2); color: #ef4444; border: 1px solid #ef4444; text-shadow: 0 0 5px #ef4444; }
        .badge-Urgent { background: rgba(234, 88, 12, 0.2); color: #f97316; border: 1px solid #f97316; text-shadow: 0 0 5px #f97316; }
        .badge-Routine { background: rgba(156, 163, 175, 0.2); color: #9ca3af; border: 1px solid #9ca3af; }
        .badge-ETA { background: rgba(6, 182, 212, 0.1); color: var(--primary); border: 1px solid var(--primary); margin-left: 5px;}

        /* Print Styles */
        @media print {
            body { background: white; color: black; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; }
            .nav, .settings-btn, button { display: none !important; }
            #aiReportOutput { display: block !important; border: none !important; }
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: var(--bg-gradient-1); border: 1px solid var(--glass-border); padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .color-grid { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: transform 0.2s; }
        .color-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="openSettings()" title="System Settings">⚙️</button>
    <h1>🏥 Hospital Queue Management</h1>
    <p class="subtitle">Computer Science Engineering Project</p>
    
    <div class="nav">
        <button id="tab-reception" class="active" onclick="switchTab('reception')">Reception Intake</button>
        <button id="tab-display" onclick="switchTab('display')">Live Queue</button>
        <button id="tab-doctor" onclick="switchTab('doctor')">Doctor Dashboard</button>
    </div>

    <div id="view-reception" class="view active">
        <h2 style="text-align: left; margin-bottom: 10px;">Patient Registration</h2>
        <input type="text" id="patientName" placeholder="Enter Patient Name..." required>
        
        <div class="ai-module">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="patientSymptoms" placeholder="Describe symptoms or use mic..." required style="margin-bottom: 0;">
                <button id="micBtn" class="action-btn" style="width: auto; padding: 0 20px; font-size: 20px; --primary: #ec4899; --primary-glow: rgba(236,72,153,0.5);" onclick="startDictation()" title="Use Voice Input">🎤</button>
            </div>
            <button id="addBtn" class="action-btn" onclick="addPatient()">Initiate AI Scan & Generate Token</button>
        </div>
        <p id="receptionMessage" style="text-align: center; font-weight: bold; margin-top: 15px; text-shadow: 0 0 8px var(--primary);"></p>
    </div>

    <div id="view-display" class="view">
        <h2>Live Priority Queue</h2>
        <div id="servingNowContainer"></div>
        <hr style="border-color: var(--glass-border); margin: 20px 0;">
        <h3 style="color: var(--text-muted);">Waiting List <span style="font-size: 0.6em; font-weight: normal;">(Predictive ETA Active)</span></h3>
        <div id="waitingListContainer"></div>
    </div>

    <div id="view-doctor" class="view">
        <h2>Doctor Control Panel</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="action-btn" style="--primary: #22c55e; --primary-glow: rgba(34,197,94,0.5);" onclick="callNextPatient()">Call Next Patient (TTS)</button>
            <button class="action-btn" style="--primary: #ef4444; --primary-glow: rgba(239,68,68,0.5);" onclick="finishCurrentPatient()">Finish Current</button>
        </div>
        <button class="action-btn" style="--primary: #64748b; --primary-glow: rgba(100,116,139,0.5);" onclick="resetQueue()">Purge System Data</button>
        
        <div id="doctorCurrentPatient" style="margin-top: 20px; font-size: 1.1em; background: var(--glass-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--glass-border);">
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2 style="margin-top: 0; text-align: center;">UI Settings</h2>
        <button class="action-btn" style="margin-bottom: 10px;" onclick="toggleTheme('dark')">Dark Matter (Default)</button>
        <button class="action-btn" onclick="toggleTheme('light')">Light Glass</button>

        <h3 style="margin-top: 20px; text-align: center;">Neon Accent</h3>
        <div class="color-grid">
            <div class="color-btn" style="background: #06b6d4;" onclick="changeColor('#06b6d4')"></div>
            <div class="color-btn" style="background: #a855f7;" onclick="changeColor('#a855f7')"></div>
            <div class="color-btn" style="background: #22c55e;" onclick="changeColor('#22c55e')"></div>
            <div class="color-btn" style="background: #ec4899;" onclick="changeColor('#ec4899')"></div>
            <div class="color-btn" style="background: #eab308;" onclick="changeColor('#eab308')"></div>
            <div class="color-btn" style="background: #ef4444;" onclick="changeColor('#ef4444')"></div>
        </div>
        <button class="action-btn" style="margin-top: 20px;" onclick="closeSettings()">Save & Close</button>
    </div>
</div>

<script>
    // --- 🚨 IMPORTANT: ADD YOUR API KEY HERE 🚨 ---
    const OPENROUTER_API_KEY = "YOUR_API_KEY_HERE"; 

    // --- SETTINGS LOGIC ---
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function changeColor(hex) {
        document.documentElement.style.setProperty('--primary', hex);
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${b}, 0.5)`);
        localStorage.setItem('hospitalColor', hex);
    }
    function toggleTheme(mode) {
        document.body.setAttribute('data-theme', mode);
        localStorage.setItem('hospitalTheme', mode);
    }

    // --- PREDICTIVE WAIT TIME ALGORITHM ---
    function calculateETA(patientId) {
        const queue = getQueue();
        const currentlyServing = queue.find(p => p.status === 'serving');
        const waiting = queue.filter(p => p.status === 'waiting');
        let time = 0;
        if (currentlyServing) time += (currentlyServing.priority === 'Critical' ? 15 : currentlyServing.priority === 'Urgent' ? 10 : 5);
        for (let p of waiting) {
            if (p.id === patientId) break;
            time += (p.priority === 'Critical' ? 15 : p.priority === 'Urgent' ? 10 : 5);
        }
        return time;
    }

    window.onload = () => {
        const savedColor = localStorage.getItem('hospitalColor');
        const savedTheme = localStorage.getItem('hospitalTheme');
        if(savedColor) changeColor(savedColor);
        if(savedTheme) toggleTheme(savedTheme);
        renderUI();
    };

    function getQueue() { return JSON.parse(localStorage.getItem('hospitalQueue')) || []; }
    function saveQueue(queue) { localStorage.setItem('hospitalQueue', JSON.stringify(queue)); renderUI(); }

    // --- AI VOICE DICTATION ---
    function startDictation() {
        const micBtn = document.getElementById('micBtn');
        const symptomInput = document.getElementById('patientSymptoms');

        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = "en-US";
            recognition.onstart = function() { micBtn.innerText = "🔴"; micBtn.style.boxShadow = "0 0 20px red"; symptomInput.placeholder = "Listening..."; };
            recognition.onresult = function(event) { symptomInput.value = event.results[0][0].transcript; resetMicBtn(micBtn, symptomInput); };
            recognition.onerror = function() { alert("Microphone error. Please type."); resetMicBtn(micBtn, symptomInput); };
            recognition.onend = function() { resetMicBtn(micBtn, symptomInput); };
            recognition.start();
        } else { alert("Voice recognition not supported. Try Chrome."); }
    }
    function resetMicBtn(btn, input) {
        btn.innerText = "🎤";
        btn.style.boxShadow = "0 0 10px var(--primary-glow) inset, 0 0 10px var(--primary-glow)";
        if (!input.value) input.placeholder = "Describe symptoms or use mic...";
    }

    // --- AI TEXT-TO-SPEECH ---
    function announcePatient(name, tokenNum) {
        if ('speechSynthesis' in window) {
            const announcement = new SpeechSynthesisUtterance();
            announcement.text = `Attention please. Token number ${tokenNum}, ${name}. Please proceed to the doctor's cabin.`;
            window.speechSynthesis.speak(announcement);
        }
    }

    // --- AI OPENROUTER API LOGIC ---
    async function getAIPriority(symptoms) {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OPENROUTER_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "meta-llama/llama-3-8b-instruct:free", 
                    messages: [{ role: "system", content: "You are a triage AI. Reply with EXACTLY ONE WORD: 'Critical', 'Urgent', or 'Routine'." }, { role: "user", content: symptoms }]
                })
            });
            const data = await response.json();
            let priority = data.choices[0].message.content.trim().replace(/[^a-zA-Z]/g, "");
            return ["Critical", "Urgent", "Routine"].includes(priority) ? priority : "Routine";
        } catch (error) { return "Routine"; }
    }

    async function requestAIDiagnosis(symptoms) {
        const outputDiv = document.getElementById('aiDiagnosisOutput');
        outputDiv.innerHTML = '<span style="color: var(--primary);">🤖 AI Neural Net is analyzing medical database...</span>';
        outputDiv.style.display = 'block';
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OPENROUTER_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "meta-llama/llama-3-8b-instruct:free", 
                    messages: [{ role: "system", content: "You are a doctor's assistant. Provide 3 possible differential diagnoses in a concise list. No greetings." }, { role: "user", content: symptoms }]
                })
            });
            const data = await response.json();
            outputDiv.innerHTML = `<strong>AI Suggested Diagnoses:</strong><br><span style="color: var(--text-muted);">${data.choices[0].message.content.trim().replace(/\n/g, '<br>')}</span>`;
        } catch (error) { outputDiv.innerHTML = '<span style="color: #ef4444;">Connection failed.</span>'; }
    }

    // --- NEW: AI SMART DISCHARGE SUMMARY REPORT ---
    async function generateSmartReport(name, symptoms, priority) {
        const outputDiv = document.getElementById('aiReportOutput');
        outputDiv.innerHTML = '<span style="color: var(--primary);">Generating official AI Discharge Summary... please wait.</span>';
        outputDiv.style.display = 'block';
        
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OPENROUTER_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "meta-llama/llama-3-8b-instruct:free", 
                    messages: [{
                        role: "system",
                        content: "You are an automated hospital AI system. Write a short, professional 'Medical Discharge Summary' for a patient. Include sections for: Clinical Summary, AI Assessment, and Recommended Care/Next Steps. Format using basic HTML tags like <strong>, <ul>, <li>, and <br>. Keep it under 150 words."
                    }, { role: "user", content: `Patient Name: ${name}. Symptoms: ${symptoms}. Triage Priority: ${priority}.` }]
                })
            });
            const data = await response.json();
            const report = data.choices[0].message.content.trim();
            
            outputDiv.innerHTML = `
                <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--primary); padding: 20px; border-radius: 8px;">
                    <h3 style="margin-top:0; color: var(--primary); text-align: center; text-transform: uppercase; letter-spacing: 2px;">🏥 Official Medical Report</h3>
                    <hr style="border-color: var(--glass-border); margin-bottom: 15px;">
                    <div style="font-size: 0.95em; line-height: 1.6; color: var(--text-main);">${report}</div>
                    <button class="action-btn" style="margin-top: 20px; background: var(--primary); color: white; border: none;" onclick="window.print()">🖨️ Print / Save as PDF</button>
                </div>
            `;
        } catch (error) {
            outputDiv.innerHTML = '<span style="color: #ef4444;">Failed to generate AI report.</span>';
        }
    }

    // --- CORE CRUD LOGIC ---
    async function addPatient() {
        const nameInput = document.getElementById('patientName');
        const symptomInput = document.getElementById('patientSymptoms');
        const msgBox = document.getElementById('receptionMessage');
        const btn = document.getElementById('addBtn');

        const name = nameInput.value.trim();
        const symptoms = symptomInput.value.trim();
        if (!name || !symptoms) { alert("Please enter both name and symptoms."); return; }

        btn.disabled = true;
        btn.innerText = "Scanning Data Matrix...";
        msgBox.style.color = "var(--primary)";
        msgBox.innerText = "Establishing secure link to OpenRouter AI...";

        const aiPriority = await getAIPriority(symptoms);
        const queue = getQueue();
        const nextId = queue.length > 0 ? Math.max(...queue.map(p => p.id)) + 1 : 1;
        
        queue.push({ id: nextId, name: name, symptoms: symptoms, status: 'waiting', priority: aiPriority });

        const pValues = { "Critical": 3, "Urgent": 2, "Routine": 1 };
        queue.sort((a, b) => {
            if (a.status === 'serving') return -1;
            if (b.status === 'serving') return 1;
            if (pValues[b.priority] !== pValues[a.priority]) return pValues[b.priority] - pValues[a.priority];
            return a.id - b.id; 
        });

        saveQueue(queue);
        nameInput.value = ''; symptomInput.value = ''; 
        btn.disabled = false;
        btn.innerText = "Initiate AI Scan & Generate Token";
        
        const color = aiPriority === 'Critical' ? '#ef4444' : (aiPriority === 'Urgent' ? '#f97316' : '#22c55e');
        msgBox.style.color = color;
        msgBox.innerHTML = `[SUCCESS] ${name} added to system. Token: #${nextId} <br> AI Threat Level: ${aiPriority}`;
        setTimeout(() => msgBox.innerText = '', 5000);
    }

    function callNextPatient() {
        const queue = getQueue();
        const currentlyServing = queue.find(p => p.status === 'serving');
        if (currentlyServing) { alert(`Finish Token #${currentlyServing.id} first.`); return; }

        const nextPatient = queue.find(p => p.status === 'waiting');
        if (nextPatient) { 
            nextPatient.status = 'serving'; 
            saveQueue(queue); 
            announcePatient(nextPatient.name, nextPatient.id);
        } else { alert("Queue is empty."); }
    }

    function finishCurrentPatient() {
        const queue = getQueue();
        const currentlyServing = queue.find(p => p.status === 'serving');
        if (currentlyServing) { currentlyServing.status = 'completed'; saveQueue(queue); }
    }

    function resetQueue() {
        if(confirm("Initiate system wipe? All queue data will be lost.")) {
            localStorage.removeItem('hospitalQueue');
            renderUI();
        }
    }

    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${tabName}`).classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
        renderUI();
    }

    function renderUI() {
        const queue = getQueue();
        const servingNowContainer = document.getElementById('servingNowContainer');
        const waitingListContainer = document.getElementById('waitingListContainer');
        
        const currentlyServing = queue.find(p => p.status === 'serving');
        const waitingPatients = queue.filter(p => p.status === 'waiting');

        if (currentlyServing) {
            servingNowContainer.innerHTML = `
                <div class="queue-box current-serving">
                    <span><strong>Now Serving:</strong> ${currentlyServing.name} <span class="badge badge-${currentlyServing.priority}">${currentlyServing.priority}</span></span> 
                    <span>Token #${currentlyServing.id}</span>
                </div>`;
        } else {
            servingNowContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center;">Standby mode. No active patient.</p>`;
        }

        waitingListContainer.innerHTML = '';
        if (waitingPatients.length > 0) {
            waitingPatients.forEach(p => {
                const eta = calculateETA(p.id);
                waitingListContainer.innerHTML += `
                <div class="queue-box">
                    <div>
                        <span>${p.name}</span>
                        <span class="badge badge-${p.priority}">${p.priority}</span>
                        <span class="badge badge-ETA">⏳ ETA: ~${eta} mins</span>
                    </div>
                    <span>Token #${p.id}</span>
                </div>`;
            });
        } else {
            waitingListContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Queue is empty.</p>';
        }

        const doctorStatus = document.getElementById('doctorCurrentPatient');
        if (currentlyServing) {
            doctorStatus.innerHTML = `
                <h3 style="margin-top: 0; color: var(--primary);">Active Case Data</h3>
                <strong>ID/Name:</strong> Token #${currentlyServing.id} - ${currentlyServing.name}<br><br>
                <strong>AI Classification:</strong> <span class="badge badge-${currentlyServing.priority}">${currentlyServing.priority}</span><br><br>
                <strong>Symptom Log:</strong> <span style="color: var(--text-muted);">"${currentlyServing.symptoms}"</span><br><br>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="action-btn" style="--primary: #a855f7; --primary-glow: rgba(168,85,247,0.5); padding: 8px 15px; font-size: 14px;" onclick="requestAIDiagnosis('${currentlyServing.symptoms}')">
                        🧠 AI Diagnosis
                    </button>
                    <button class="action-btn" style="--primary: #0ea5e9; --primary-glow: rgba(14,165,233,0.5); padding: 8px 15px; font-size: 14px;" onclick="generateSmartReport('${currentlyServing.name}', '${currentlyServing.symptoms}', '${currentlyServing.priority}')">
                        📜 Generate Report
                    </button>
                </div>
                
                <div id="aiDiagnosisOutput" style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; border-left: 3px solid #a855f7; font-size: 0.9em; display: none;"></div>
                
                <div id="aiReportOutput" style="margin-top: 15px; display: none;"></div>
            `;
        } else {
            doctorStatus.innerHTML = `<strong style="color: var(--text-muted);">System Status: Idle / Ready for next intake.</strong>`;
        }
    }
</script>
