<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Hospital Queue</title>
    <style>
        :root {
            /* Default Holographic Theme Variables */
            --primary: #06b6d4; /* Cyan glow */
            --primary-glow: rgba(6, 182, 212, 0.5);
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --bg-gradient-3: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg-gradient-1: #e0f2fe;
            --bg-gradient-2: #ede9fe;
            --bg-gradient-3: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-muted: #475569;
            --input-bg: rgba(255, 255, 255, 0.6);
        }

        /* Animated Holographic Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: all 0.5s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h1, h2, h3 {
            text-align: center;
            text-shadow: 0 0 10px var(--primary-glow);
            letter-spacing: 1px;
        }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .settings-btn:hover {
            transform: rotate(90deg);
        }

        /* Navigation Tabs */
        .nav {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
        .nav button {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px 20px;
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .nav button:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .nav button.active {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
            border-bottom: 3px solid var(--primary);
            background: linear-gradient(to top, var(--primary-glow), transparent);
        }

        /* Views */
        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs & Buttons */
        input {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        button.action-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--primary);
            box-shadow: 0 0 10px var(--primary-glow) inset, 0 0 10px var(--primary-glow);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button.action-btn:hover { 
            background-color: var(--primary); 
            color: #fff;
            box-shadow: 0 0 20px var(--primary);
        }
        button.action-btn:disabled { 
            border-color: var(--text-muted);
            box-shadow: none;
            color: var(--text-muted);
            cursor: not-allowed; 
        }

        /* Queue Display Boxes */
        .queue-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: transform 0.2s ease;
        }
        .queue-box:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }
        .current-serving {
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
            border-left: 4px solid #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        /* AI Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-Critical { background: rgba(220, 38, 38, 0.2); color: #ef4444; border: 1px solid #ef4444; text-shadow: 0 0 5px #ef4444; }
        .badge-Urgent { background: rgba(234, 88, 12, 0.2); color: #f97316; border: 1px solid #f97316; text-shadow: 0 0 5px #f97316; }
        .badge-Routine { background: rgba(156, 163, 175, 0.2); color: #9ca3af; border: 1px solid #9ca3af; }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: var(--bg-gradient-1);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .color-grid {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn:hover { transform: scale(1.2); }
        .close-modal { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="openSettings()" title="System Settings">⚙️</button>
    <h1>🧠 Holographic AI Triage</h1>
    
    <div class="nav">
        <button id="tab-reception" class="active" onclick="switchTab('reception')">Intake Terminal</button>
        <button id="tab-display" onclick="switchTab('display')">Live Queue</button>
        <button id="tab-doctor" onclick="switchTab('doctor')">Medical Dashboard</button>
    </div>

    <div id="view-reception" class="view active">
        <h2>Patient Registration</h2>
        <input type="text" id="patientName" placeholder="Enter Patient Name..." required>
        <input type="text" id="patientSymptoms" placeholder="Describe symptoms for AI Analysis..." required>
        
        <button id="addBtn" class="action-btn" onclick="addPatient()">Initiate AI Scan & Generate Token</button>
        <p id="receptionMessage" style="text-align: center; font-weight: bold; margin-top: 15px; text-shadow: 0 0 8px var(--primary);"></p>
    </div>

    <div id="view-display" class="view">
        <h2>Live Priority Queue</h2>
        <div id="servingNowContainer"></div>
        <hr style="border-color: var(--glass-border); margin: 20px 0;">
        <h3 style="color: var(--text-muted);">Waiting List</h3>
        <div id="waitingListContainer"></div>
    </div>

    <div id="view-doctor" class="view">
        <h2>Doctor Control Panel</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="action-btn" style="--primary: #22c55e; --primary-glow: rgba(34,197,94,0.5);" onclick="callNextPatient()">Call Next Patient</button>
            <button class="action-btn" style="--primary: #ef4444; --primary-glow: rgba(239,68,68,0.5);" onclick="finishCurrentPatient()">Finish Current</button>
        </div>
        <button class="action-btn" style="--primary: #64748b; --primary-glow: rgba(100,116,139,0.5);" onclick="resetQueue()">Purge System Data</button>
        
        <div id="doctorCurrentPatient" style="margin-top: 20px; font-size: 1.1em; background: var(--glass-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--glass-border);">
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2 style="margin-top: 0;">UI Settings</h2>
        
        <h3>Hologram Theme</h3>
        <button class="action-btn" style="margin-bottom: 10px;" onclick="toggleTheme('dark')">Dark Matter (Default)</button>
        <button class="action-btn" onclick="toggleTheme('light')">Light Glass</button>

        <h3 style="margin-top: 20px;">Neon Accent Color</h3>
        <div class="color-grid">
            <div class="color-btn" style="background: #06b6d4;" onclick="changeColor('#06b6d4')"></div> <div class="color-btn" style="background: #a855f7;" onclick="changeColor('#a855f7')"></div> <div class="color-btn" style="background: #22c55e;" onclick="changeColor('#22c55e')"></div> <div class="color-btn" style="background: #ec4899;" onclick="changeColor('#ec4899')"></div> <div class="color-btn" style="background: #eab308;" onclick="changeColor('#eab308')"></div> <div class="color-btn" style="background: #ef4444;" onclick="changeColor('#ef4444')"></div> </div>

        <button class="action-btn close-modal" onclick="closeSettings()">Save & Close</button>
    </div>
</div>

<script>
    // --- 🚨 IMPORTANT: ADD YOUR API KEY HERE 🚨 ---
    const OPENROUTER_API_KEY = "YOUR_API_KEY_HERE"; 

    // --- SETTINGS & THEME LOGIC ---
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    function changeColor(hex) {
        document.documentElement.style.setProperty('--primary', hex);
        // Convert hex to rgba for glow
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${b}, 0.5)`);
        localStorage.setItem('hospitalColor', hex);
    }

    function toggleTheme(mode) {
        document.body.setAttribute('data-theme', mode);
        localStorage.setItem('hospitalTheme', mode);
    }

    // Load saved preferences
    window.onload = () => {
        const savedColor = localStorage.getItem('hospitalColor');
        const savedTheme = localStorage.getItem('hospitalTheme');
        if(savedColor) changeColor(savedColor);
        if(savedTheme) toggleTheme(savedTheme);
        renderUI();
    };

    // --- DATABASE ---
    function getQueue() {
        const data = localStorage.getItem('hospitalQueue');
        return data ? JSON.parse(data) : [];
    }
    function saveQueue(queue) {
        localStorage.setItem('hospitalQueue', JSON.stringify(queue));
        renderUI();
    }

    // --- AI TRIAGE LOGIC ---
    async function getAIPriority(symptoms) {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-3-8b-instruct:free", 
                    messages: [{
                        role: "system",
                        content: "You are a hospital triage AI. Read the symptoms and reply with EXACTLY ONE WORD from this list: 'Critical', 'Urgent', or 'Routine'. No punctuation, no explanation."
                    }, {
                        role: "user",
                        content: symptoms
                    }]
                })
            });
            const data = await response.json();
            let priority = data.choices[0].message.content.trim().replace(/[^a-zA-Z]/g, "");
            return ["Critical", "Urgent", "Routine"].includes(priority) ? priority : "Routine";
        } catch (error) {
            console.error("AI Triage Failed:", error);
            return "Routine"; 
        }
    }

    // --- CORE LOGIC ---
    async function addPatient() {
        const nameInput = document.getElementById('patientName');
        const symptomInput = document.getElementById('patientSymptoms');
        const msgBox = document.getElementById('receptionMessage');
        const btn = document.getElementById('addBtn');

        const name = nameInput.value.trim();
        const symptoms = symptomInput.value.trim();

        if (!name || !symptoms) { alert("Please enter both name and symptoms."); return; }

        btn.disabled = true;
        btn.innerText = "Scanning Data Matrix...";
        msgBox.style.color = "var(--primary)";
        msgBox.innerText = "Establishing secure link to OpenRouter AI...";

        const aiPriority = await getAIPriority(symptoms);
        const queue = getQueue();
        const nextId = queue.length > 0 ? Math.max(...queue.map(p => p.id)) + 1 : 1;
        
        queue.push({ id: nextId, name: name, symptoms: symptoms, status: 'waiting', priority: aiPriority });

        const pValues = { "Critical": 3, "Urgent": 2, "Routine": 1 };
        queue.sort((a, b) => {
            if (a.status === 'serving') return -1;
            if (b.status === 'serving') return 1;
            if (pValues[b.priority] !== pValues[a.priority]) return pValues[b.priority] - pValues[a.priority];
            return a.id - b.id; 
        });

        saveQueue(queue);
        
        nameInput.value = ''; symptomInput.value = ''; 
        btn.disabled = false;
        btn.innerText = "Initiate AI Scan & Generate Token";
        
        const color = aiPriority === 'Critical' ? '#ef4444' : (aiPriority === 'Urgent' ? '#f97316' : '#22c55e');
        msgBox.style.color = color;
        msgBox.innerHTML = `[SUCCESS] ${name} added to system. Token: #${nextId} <br> AI Threat Level: ${aiPriority}`;
        setTimeout(() => msgBox.innerText = '', 5000);
    }

    function callNextPatient() {
        const queue = getQueue();
        const currentlyServing = queue.find(p => p.status === 'serving');
        
        if (currentlyServing) { alert(`Finish Token #${currentlyServing.id} first.`); return; }

        const nextPatient = queue.find(p => p.status === 'waiting');
        if (nextPatient) { nextPatient.status = 'serving'; saveQueue(queue); } 
        else { alert("Queue is empty."); }
    }

    function finishCurrentPatient() {
        const queue = getQueue();
        const currentlyServing = queue.find(p => p.status === 'serving');
        if (currentlyServing) { currentlyServing.status = 'completed'; saveQueue(queue); }
    }

    function resetQueue() {
        if(confirm("Initiate system wipe? All queue data will be lost.")) {
            localStorage.removeItem('hospitalQueue');
            renderUI();
        }
    }

    // --- UI RENDERING ---
    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${tabName}`).classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
        renderUI();
    }

    function renderUI() {
        const queue = getQueue();
        const servingNowContainer = document.getElementById('servingNowContainer');
        const waitingListContainer = document.getElementById('waitingListContainer');
        
        const currentlyServing = queue.find(p => p.status === 'serving');
        const waitingPatients = queue.filter(p => p.status === 'waiting');

        if (currentlyServing) {
            servingNowContainer.innerHTML = `
                <div class="queue-box current-serving">
                    <span><strong>Now Serving:</strong> ${currentlyServing.name} <span class="badge badge-${currentlyServing.priority}">${currentlyServing.priority}</span></span> 
                    <span>Token #${currentlyServing.id}</span>
                </div>`;
        } else {
            servingNowContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center;">Standby mode. No active patient.</p>`;
        }

        waitingListContainer.innerHTML = '';
        if (waitingPatients.length > 0) {
            waitingPatients.forEach(p => {
                waitingListContainer.innerHTML += `
                <div class="queue-box">
                    <span>${p.name} <span class="badge badge-${p.priority}">${p.priority}</span></span> 
                    <span>Token #${p.id}</span>
                </div>`;
            });
        } else {
            waitingListContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Queue is empty.</p>';
        }

        const doctorStatus = document.getElementById('doctorCurrentPatient');
        if (currentlyServing) {
            doctorStatus.innerHTML = `
                <h3 style="margin-top: 0; color: var(--primary);">Active Case Data</h3>
                <strong>ID/Name:</strong> Token #${currentlyServing.id} - ${currentlyServing.name}<br><br>
                <strong>AI Classification:</strong> <span class="badge badge-${currentlyServing.priority}">${currentlyServing.priority}</span><br><br>
                <strong>Symptom Log:</strong> <span style="color: var(--text-muted);">"${currentlyServing.symptoms}"</span>
            `;
        } else {
            doctorStatus.innerHTML = `<strong style="color: var(--text-muted);">System Status: Idle / Ready for next intake.</strong>`;
        }
    }
</script>

</body>
</html>
</body>
</html>
